  answers.forEach(a => Object.keys(a).forEach(k => { t[k] = (t[k]||0) + a[k]; }));
  return wines.reduce((best,w) => {
    const s  = -Object.keys(t).reduce((acc,k) => acc + Math.abs(t[k] - w.tags[k]*2), 0);
    const bs = -Object.keys(t).reduce((acc,k) => acc + Math.abs(t[k] - best.tags[k]*2), 0);
    return s > bs ? w : best;
  }, wines[0]);
}

function bottleSVG(w) {

    <circle cx="56" cy="215" r="1.5" fill="white" opacity="0.25"/>

  return `<svg viewBox="0 0 120 280" width="100" height="240">
    <rect x="46" y="10" width="28" height="18" rx="4" fill="${w.labelColor}" opacity="0.9"/>
    <rect x="50" y="26" width="20" height="30" rx="2" fill="${w.bottleColor}"/>

    <text x="60" y="152" text-anchor="middle" fill="white" font-size="4.2" font-family="Georgia,serif">${w.labelText[0]}</text>

    ${bubbles}
  </svg>`;
}

// ── STATE ──
let state = {
  screen: "start",
  quizIdx: 0, quizSel: null, showFact: false,
  diagIdx: 0, diagSel: null, diagAnswers: [],
  result: null
};

function render() {
  const app = document.getElementById("app");
  const s = state;
  const total = quizQs.length + diagQs.length;
  const curStep = s.screen==="quiz" ? s.quizIdx : s.screen==="diagnosis" ? quizQs.length + s.diagIdx : total;
  const pct = Math.round((curStep/total)*100);

  const progressHTML = (label) => `
    <div class="progress-wrap">
      <div class="progress-top"><span>${label}</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-dots">${Array.from({length:total},(_,i)=>`<span class="${i<curStep?'done':''}"></span>`).join('')}</div>
    </div>`;

  if (s.screen === "start") {
    app.innerHTML = `<div class="screen start">
      <div class="emoji">🍷</div>
      <div class="label">Sirromet Wines · Queensland, Australia</div>
      <h1>Sirrometクイズ<br>& ワイン診断</h1>
      <p>ツアーの復習クイズ（3問）のあと、<br>あなたにぴったりのワインを診断します（5問）。</p>
      <div class="steps">
        <div class="step-box"><span class="icon">🧠</span><span class="slabel">クイズ</span><span class="snum">3問</span></div>
        <div class="step-box"><span class="icon">🍷</span><span class="slabel">ワイン診断</span><span class="snum">5問</span></div>
        <div class="step-box"><span class="icon">🎁</span><span class="slabel">クチコミで</span><span class="snum">5% OFF</span></div>
      </div>
      <button class="btn-primary" onclick="go('quiz')">スタート 🌿</button>
      <p class="note-sm">所要時間：約2分</p>
    </div>`;
    return;
  }

  if (s.screen === "quiz") {
    const qq = quizQs[s.quizIdx];
    const optsHTML = !s.showFact
      ? qq.opts.map((o,i) => `<button class="opt-btn${s.quizSel===i?' selected':''}" onclick="quizSelect(${i})">${s.quizSel===i?'<span class="check">✓</span> ':''}${o}</button>`).join('')
      : `<div class="fact-box">✨ ${qq.fact}</div>`;
    const btnLabel = s.showFact ? (s.quizIdx+1>=quizQs.length ? "ワイン診断へ 🍷" : "次のクイズへ →") : "答えを見る ✨";
    app.innerHTML = `<div class="screen">
      ${progressHTML(`🧠 クイズ ${s.quizIdx+1}/3`)}
      <div class="card">
        <span class="badge green">🧠 Sirrometクイズ</span>
        <h2>${qq.q}</h2>
        ${qq.note ? `<div class="tip">${qq.note}</div>` : ''}
        <div class="options">${optsHTML}</div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="quizNext()" ${s.quizSel===null?'disabled':''}>${btnLabel}</button>
      </div>
    </div>`;
    return;
  }

  if (s.screen === "diagnosis") {
    const dq = diagQs[s.diagIdx];
    const isExpert = dq.cat === "expert";
    const optsHTML = dq.opts.map((o,i) => `<button class="opt-btn${s.diagSel===i?' selected':''}" onclick="diagSelect(${i})">${s.diagSel===i?'<span class="check">✓</span> ':''}${o.label}</button>`).join('');
    const btnLabel = s.diagIdx+1===diagQs.length ? "結果を見る 🍷" : "次へ →";
    app.innerHTML = `<div class="screen">
      ${progressHTML(`🍷 ワイン診断 ${s.diagIdx+1}/5`)}
      <div class="card">
        <span class="badge ${isExpert?'yellow':'green'}">${catLabels[dq.cat]||dq.cat}</span>
        <h2>${dq.q}</h2>
        ${dq.note ? `<div class="tip">${dq.note}</div>` : ''}
        <div class="options">${optsHTML}</div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="diagNext()" ${s.diagSel===null?'disabled':''}>${btnLabel}</button>
      </div>
    </div>`;
    return;
  }

  if (s.screen === "result") {
    const w = s.result;
    app.innerHTML = `<div class="screen">
      <div class="result-header">
        <div class="sublabel">YOUR WINE MATCH · QUEENSLAND, AUSTRALIA</div>
        <h2>あなたにぴったりのワインは…</h2>
      </div>
      <div class="wine-card" style="border: 1.5px solid ${w.accent}55;">
        <div class="bottle-area" style="background: linear-gradient(160deg,${w.bottleColor}40,${w.bottleColor}15);">
          <div class="bottle-grad"></div>
          ${bottleSVG(w)}
        </div>
        <div class="wine-info">
          <div class="wine-type">${w.type.toUpperCase()} · SIRROMET WINES</div>
          <div class="wine-name">${w.name}</div>
          <div class="wine-copy">🌊 ${w.catchcopy}</div>
          <div class="wine-desc">${w.description}</div>
          <span class="wine-price">${w.price} AUD</span>
        </div>
      </div>
      <div class="ta-cta">
        <div class="ta-icon">🎁</div>
        <div class="ta-title">クチコミを書いて</div>
        <div class="ta-discount">5% OFF</div>
        <div class="ta-note">投稿後、この画面をスタッフに見せると<br>割引が適用されます</div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
          <a href="${VELTRA_URL}" target="_blank" class="btn-ta" style="width:260px;text-align:center;">✈️ ベルトラに体験談を書く</a>
          <a href="${GOOGLE_URL}" target="_blank" class="btn-ta" style="width:260px;text-align:center;background:linear-gradient(135deg,#4285F4,#34A853);">🗺️ Googleマップに口コミを書く</a>
        </div>
        <p style="color:#6a9878;font-size:11px;margin-top:12px;">ベルトラで予約の方はベルトラへ、それ以外の方はGoogleマップへ</p>
      </div>
      <div class="discount-badge">
        <div class="db-note">クチコミを書いたら、この画面をスタッフへ</div>
        <div class="db-num">5% OFF</div>
        <div class="db-sub">セラードア・レストランでご利用いただけます</div>
      </div>
      <div class="btn-row-center">
        <button class="btn-ghost" onclick="restart()">もう一度試す</button>
        <a href="${w.url}" target="_blank" class="btn-buy">ワインを購入 →</a>
      </div>
    </div>`;
    return;
  }
}

function go(screen) { state.screen = screen; render(); }

function quizSelect(i) { state.quizSel = i; render(); }

function quizNext() {
  if (state.quizSel === null) return;
  if (!state.showFact) { state.showFact = true; render(); return; }
  state.showFact = false; state.quizSel = null;
  if (state.quizIdx + 1 >= quizQs.length) { state.screen = "diagnosis"; }
  else { state.quizIdx++; }
  render();
}

function diagSelect(i) { state.diagSel = i; render(); }

function diagNext() {
  if (state.diagSel === null) return;
  const dq = diagQs[state.diagIdx];
  state.diagAnswers.push(dq.opts[state.diagSel].s);
  if (state.diagIdx + 1 >= diagQs.length) {
    state.result = calcResult(state.diagAnswers);
    state.screen = "result";
  } else {
    state.diagIdx++; state.diagSel = null;
  }
  render();
}

function restart() {
  state = { screen:"start", quizIdx:0, quizSel:null, showFact:false, diagIdx:0, diagSel:null, diagAnswers:[], result:null };
  render();
}

render();
</script>
</body>
</html>
